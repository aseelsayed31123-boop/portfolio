<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header>
        <h1>Personal Course Organizer</h1>
        <p>All Your Courses in One Place</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html" class="active" title="go to home">Home</a></li>
            <li><a href="courses.html" title="go to My Courses">My Courses</a></li>
            <li><a href="add.html" title='add new courses'>Add Courses</a></li>
            <li><a href="contact.html" title="Contact Us">Contact Us</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Add a New Course</h2>

            <form>
                <label for="course">Course Name:</label>
                <input type="text" id="course" name="course" required placeholder="Enter the name of course ">
                <br><br>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required
                    placeholder="Enter the name of Instructor ">
                <br><br>

                <label for="credits">Credit Hours:</label>
                <input type="number" id="credits" name="credits" min="1" max="6" required
                    placeholder="Enter the number of credit hours ">
                <br><br>

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" placeholder="any note about this course"></textarea>
                <br><br>
                <button type="submit">Add Course</button>
                <button type="reset">Clear Form</button>
            </form>

        </section>
    </main>
    <footer>
        <p>&copy;Designed by Aseel 2026 Personal Course Organizer. All rights reserved</p>
    </footer>

</body>

</html>
